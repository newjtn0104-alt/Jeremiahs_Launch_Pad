<!-- Taylor C712 Cartoon SVG Placeholder -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- Background -->
  <rect width="400" height="500" fill="#f1f5f9"/>
  
  <!-- Machine Shadow -->
  <ellipse cx="200" cy="460" rx="140" ry="20" fill="#cbd5e1" opacity="0.5"/>
  
  <!-- Machine Base -->
  <rect x="80" y="380" width="240" height="70" rx="8" fill="#64748b"/>
  <rect x="90" y="390" width="220" height="50" rx="4" fill="#94a3b8"/>
  
  <!-- Machine Body -->
  <rect x="60" y="120" width="280" height="270" rx="12" fill="#e2e8f0"/>
  <rect x="70" y="130" width="260" height="250" rx="8" fill="#f8fafc"/>
  
  <!-- Top Control Panel -->
  <rect x="60" y="80" width="280" height="50" rx="8" fill="#3b82f6"/>
  <rect x="70" y="90" width="260" height="30" rx="4" fill="#60a5fa"/>
  
  <!-- Display Screen -->
  <rect x="100" y="95" width="120" height="20" rx="2" fill="#1e293b"/>
  <text x="160" y="109" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="12">TAYLOR C712</text>
  
  <!-- Control Buttons -->
  <circle cx="280" cy="105" r="8" fill="#ef4444"/>
  <circle cx="300" cy="105" r="8" fill="#22c55e"/>
  <circle cx="320" cy="105" r="8" fill="#3b82f6"/>
  
  <!-- Hopper (Top Opening) -->
  <rect x="110" y="50" width="180" height="40" rx="4" fill="#cbd5e1"/>
  <rect x="120" y="55" width="160" height="30" rx="2" fill="#e2e8f0"/>
  <rect x="130" y="60" width="140" height="20" rx="2" fill="#f1f5f9"/>
  
  <!-- Hopper Lid -->
  <rect x="105" y="45" width="190" height="8" rx="2" fill="#94a3b8"/>
  
  <!-- Side Panel Details -->
  <rect x="80" y="160" width="240" height="2" fill="#cbd5e1"/>
  <rect x="80" y="200" width="240" height="2" fill="#cbd5e1"/>
  <rect x="80" y="240" width="240" height="2" fill="#cbd5e1"/>
  <rect x="80" y="280" width="240" height="2" fill="#cbd5e1"/>
  <rect x="80" y="320" width="240" height="2" fill="#cbd5e1"/>
  
  <!-- Front Door/Panel -->
  <rect x="140" y="160" width="120" height="180" rx="4" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="2"/>
  <rect x="150" y="170" width="100" height="160" rx="2" fill="#f8fafc"/>
  
  <!-- Door Handle -->
  <rect x="235" y="230" width="8" height="40" rx="2" fill="#64748b"/>
  
  <!-- Dispensing Spout -->
  <rect x="180" y="340" width="40" height="50" rx="4" fill="#94a3b8"/>
  <rect x="185" y="345" width="30" height="35" rx="2" fill="#cbd5e1"/>
  <ellipse cx="200" cy="390" rx="15" ry="8" fill="#64748b"/>
  
  <!-- Drip Tray -->
  <rect x="130" y="400" width="140" height="15" rx="4" fill="#475569"/>
  <rect x="135" y="403" width="130" height="8" rx="2" fill="#334155"/>
  
  <!-- Power Cord -->
  <path d="M 320 430 Q 350 430 360 450 Q 370 470 380 480" stroke="#475569" stroke-width="6" fill="none"/>
  <rect x="375" y="475" width="15" height="20" rx="2" fill="#334155"/>
  
  <!-- Ventilation Grills -->
  <line x1="85" y1="150" x2="115" y2="150" stroke="#94a3b8" stroke-width="3"/>
  <line x1="85" y1="155" x2="115" y2="155" stroke="#94a3b8" stroke-width="3"/>
  <line x1="85" y1="160" x2="115" y2="160" stroke="#94a3b8" stroke-width="3"/>
  
  <line x1="285" y1="150" x2="315" y2="150" stroke="#94a3b8" stroke-width="3"/>
  <line x1="285" y1="155" x2="315" y2="155" stroke="#94a3b8" stroke-width="3"/>
  <line x1="285" y1="160" x2="315" y2="160" stroke="#94a3b8" stroke-width="3"/>
  
  <!-- Wheels -->
  <circle cx="100" cy="455" r="12" fill="#334155"/>
  <circle cx="100" cy="455" r="6" fill="#475569"/>
  <circle cx="300" cy="455" r="12" fill="#334155"/>
  <circle cx="300" cy="455" r="6" fill="#475569"/>
  
  <!-- Brand Label -->
  <rect x="170" y="300" width="60" height="20" rx="2" fill="#3b82f6"/>
  <text x="200" y="314" text-anchor="middle" fill="white" font-family="Arial" font-size="10" font-weight="bold">TAYLOR</text>
  
  <!-- Decorative Elements -->
  <circle cx="90" cy="350" r="15" fill="#dbeafe" opacity="0.5"/>
  <circle cx="310" cy="200" r="20" fill="#dbeafe" opacity="0.5"/>
  <circle cx="320" cy="360" r="12" fill="#dbeafe" opacity="0.5"/>
</svg>